# Nixpacks config for Dokploy deployment (Next.js + MySQL)
[phases.setup]
# Prisma 7.5+ requires Node 20.19+, 22.12+, or 24+; nodejs_20 in Nix gives 20.18.x
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "prisma migrate deploy && next start"

[variables]
NODE_ENV = "production"
